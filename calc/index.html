<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bonus Express</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h1>💰 Bonus Express</h1>

<label>Monto</label>

<input
type="number"
id="monto"
placeholder="Ej: 5000"
>

<label>Porcentaje</label>

<input
type="number"
id="porcentaje"
placeholder="Ej: 20"
>

<div class="botones">

<button onclick="ponerPorcentaje(15)">15%</button>

<button onclick="ponerPorcentaje(20)">20%</button>

<button onclick="ponerPorcentaje(30)">30%</button>

</div>

<div class="resultado">

<h3>✅ Bono agregado</h3>

<p id="bonus">$0</p>

<h3>💰 Total con porcentaje</h3>

<p id="total">$0</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
